{{ define "topbar" }}
      <header class="topbar">
        <button class="mobile-menu-btn" id="mobileMenuBtn" type="button" aria-label="Open menu">
          <i class="icon icon-menu" aria-hidden="true"></i>
        </button>

        <form class="search" action="/search" method="get" role="search">
          <i class="icon icon-search search-leading-icon" aria-hidden="true"></i>
          <input type="search" name="q" value="{{ .Search }}" placeholder="Search channels and videos..." />
          <button class="search-clear" type="button" aria-label="Clear search">
            <i class="icon icon-x" aria-hidden="true"></i>
          </button>
        </form>

        <nav class="topbar-actions" aria-label="Quick actions">
          <form action="/refresh" method="post">
            <button class="icon-btn" type="submit" aria-label="Refresh" title="Refresh">
              <i class="icon icon-reload" aria-hidden="true"></i>
            </button>
          </form>
          <button id="themeToggle" class="icon-btn" type="button" aria-label="Toggle theme">
            <i class="icon icon-moon" aria-hidden="true"></i>
          </button>
        </nav>
      </header>
{{ end }}
